<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Listener</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section>
   

    <button id="counter-btn">Click Me</button>

    <p>
      Count:
      <span id="count">0</span>
    </p>
  </section>

  <section>

    <input
      type="text"
      id="live-input"
      placeholder="Type ..."
    />

    <p id="preview">Start typing...</p>
  </section>

  <section>

    <form id="reg-form">
      <input
        type="text"
        id="name-field"
        placeholder="Enter your name"
      />

      <button type="submit">Register</button>
    </form>

    <p id="welcome"></p>
  </section>
  <section>
    <ul id="todo-list">
      <li>Learn JavaScript</li>
      <li>Practice DOM</li>
      <li>Build Projects</li>
    </ul>
  </section>
  <section>

    <button id="color-btn">
      Change Background Color
    </button>
  </section>

  <section>

    <input
      type="text"
      id="validate-input"
      placeholder="Minimum 3 characters check"
    />

  </section>

  <section>

    <form id="sum-form">

      <input
        type="number"
        id="num1"
        placeholder="Enter first number"
      />

      <input
        type="number"
        id="num2"
        placeholder="Enter second number"
      />

      <button type="submit">
        Calculate Sum
      </button>

    </form>

    <h3 id="sum-result">
      Result
    </h3>
  </section>
  <section>

    <ul id="delegation-list">
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>
  </section>
  <script src="index.js"></script>

</body>
</html>
